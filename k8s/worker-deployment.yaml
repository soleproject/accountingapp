---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiom-worker
  labels: { app: axiom-worker }
spec:
  replicas: 1                    # HPA scales this 1 → 8 based on load
  selector: { matchLabels: { app: axiom-worker } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: axiom-worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/axiom-ledger/backend:latest
          # Same image as backend — just runs a different command.
          command: ["arq", "worker.WorkerSettings"]
          workingDir: /app/backend
          envFrom:
            - secretRef: { name: axiom-secrets }
          resources:
            requests: { cpu: "500m",  memory: "512Mi" }
            limits:   { cpu: "2000m", memory: "1Gi"   }
          # Arq worker has its own health probe — a simple ping to redis.
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import os,redis; redis.from_url(os.environ['REDIS_URL']).ping()"
            initialDelaySeconds: 30
            periodSeconds: 30
