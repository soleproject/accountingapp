# Nixpacks tells Railway which Node version to use for the React build.
# nodejs_22 pulls Node 22.x — some tooling in the CRA/ESLint chain
# requires Node 20.19+ or 22, and pinning to 22 keeps things clean.
[phases.setup]
nixPkgs = ["nodejs_22", "yarn"]

[phases.install]
# `yarn cache clean` nukes stale offline-mirror entries in Railway's
# persistent build cache mount before install. Prevents the ENOENT
# failure mode where a manifest entry exists but the tarball never
# fully materialized (has-symbols corruption seen Feb 2026). The
# `--network-timeout` also helps on flakey Nixpacks builder networks
# — the default 30s is not enough for larger transitive graphs.
cmds = [
  "yarn cache clean",
  "yarn install --frozen-lockfile --network-timeout 600000",
]

[phases.build]
# Explicitly set NODE_ENV=production during build so craco/react-scripts
# emit a real production bundle (no react-refresh, no dev HMR runtime).
cmds = ["NODE_ENV=production yarn build"]

[start]
# `serve` is a tiny static file server; -s makes it SPA-friendly (all
# unknown routes fall back to index.html so React Router works).
cmd = "npx --yes serve -s build -l $PORT"
